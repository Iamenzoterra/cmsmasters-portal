<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1220" />
  <title>Content Studio — Delete Confirmation Modal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Manrope', sans-serif;
      width: 1220px;
      height: 844px;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Overlay ── */
    .overlay {
      position: fixed;
      inset: 0;
      width: 1220px;
      height: 844px;
      background: rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Modal card ── */
    .modal {
      width: 480px;
      background: rgb(255, 255, 255);
      border-radius: 16px;
      padding: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.16), 0 8px 16px rgba(0, 0, 0, 0.08);
    }

    /* ── Warning icon ── */
    .warning-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgb(254, 242, 242);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .warning-icon svg {
      width: 24px;
      height: 24px;
      color: rgb(220, 38, 38);
    }

    /* ── Text ── */
    .modal-text {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 600;
      line-height: 1.3;
      color: rgb(24, 24, 24);
    }

    .modal-description {
      font-size: 15px;
      font-weight: 400;
      line-height: 1.6;
      color: rgb(84, 84, 84);
    }

    /* ── Buttons ── */
    .modal-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      width: 100%;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 40px;
      padding: 0 24px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.15s, box-shadow 0.15s;
    }

    .btn-cancel {
      background: transparent;
      color: rgb(24, 24, 24);
      border: 1px solid rgb(234, 229, 224);
    }
    .btn-cancel:hover {
      background: rgb(250, 248, 247);
    }

    .btn-delete {
      background: rgb(220, 38, 38);
      color: #fff;
      border: none;
    }
    .btn-delete:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <!-- Dark overlay + centered modal -->
  <div class="overlay">
    <div class="modal">

      <!-- Warning icon -->
      <div class="warning-icon">
        <i data-lucide="alert-triangle"></i>
      </div>

      <!-- Text -->
      <div class="modal-text">
        <div class="modal-title">Delete Flavor Theme?</div>
        <div class="modal-description">
          This action cannot be undone. The theme and all its data will be permanently removed.
        </div>
      </div>

      <!-- Actions -->
      <div class="modal-actions">
        <button class="btn btn-cancel">Cancel</button>
        <button class="btn btn-delete">Delete</button>
      </div>

    </div>
  </div>

  <!-- Lucide icons init -->
  <script>lucide.createIcons();</script>

  <!-- Figma capture script -->
  <script>
    // Figma HTML-to-image capture helper
    // Usage: call window.__figmaCapture() from Figma plugin or dev console
    window.__figmaCapture = async function () {
      const { default: htmlToImage } = await import('https://esm.sh/html-to-image@1.11.11');
      const node = document.body;
      const dataUrl = await htmlToImage.toPng(node, {
        width: 1220,
        height: 844,
        canvasWidth: 1220,
        canvasHeight: 844,
        pixelRatio: 2,
      });
      // Copy to clipboard as blob
      const res = await fetch(dataUrl);
      const blob = await res.blob();
      await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
      console.log('[Figma capture] PNG copied to clipboard (1220x844 @2x)');
      return dataUrl;
    };
  </script>

</body>
</html>
