version: 1
name: Two Column Right
scope: _preset-two-column-right
description: Header, content | sidebar-right, footer. For docs, blog posts, articles.

grid:
  desktop:
    min-width: "1440px"
    columns:
      content: "1fr"
      sidebar-right: "320px"
    column-gap: "--spacing-2xl"
    max-width: "1100px"
    center: true
  tablet:
    min-width: "768px"
    columns:
      content: "1fr"
    column-gap: "0"
    sidebars: drawer
    drawer-width: "300px"
    drawer-trigger: tab
    drawer-position: right
  mobile:
    min-width: "0px"
    columns:
      content: "1fr"
    column-gap: "0"
    sidebars: drawer
    drawer-width: "280px"
    drawer-trigger: hamburger
    drawer-position: right

slots:
  header:
    position: top
    sticky: true
    z-index: 100
    padding: "0"
  content:
    padding: "--spacing-2xl"
    gap: "--spacing-xl"
    min-height: "600px"
  sidebar-right:
    padding: "--spacing-lg"
    gap: "--spacing-md"
    min-height: "400px"
  footer:
    position: bottom
    margin-top: "--spacing-2xl"
    min-height: "120px"
