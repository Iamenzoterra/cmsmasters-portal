version: 1
name: the-new
scope: theme
background: '--bg-surface'
grid:
  desktop:
    min-width: 1440px
    columns:
      sidebar-left: 1fr
      content: 1fr
      sidebar-right: 1fr
    column-gap: '0'
    slots:
      content:
        padding-top: '--spacing-xl'
slots:
  header:
    position: top
    sticky: true
    z-index: 999
  content:
    padding: '--spacing-xl'
    padding-x: '0'
    padding-top: '--spacing-xl'
    align: center
    max-width: 615px
    nested-slots:
      - theme-blocks
  footer:
    position: bottom
  sidebar-left:
    padding-top: '--spacing-xl'
    padding-bottom: '--spacing-xl'
    align: center
    max-width: 360px
    min-height: 400px
  sidebar-right:
    padding-top: '--spacing-xl'
    padding-bottom: '--spacing-xl'
    align: center
    max-width: 360px
    min-height: 400px
  theme-blocks:
    padding-top: '--spacing-xl'
    padding-bottom: '--spacing-xl'
    align: center
    max-width: 615px
  theme-title:
    position: top
    padding-top: '--spacing-md'
    padding-bottom: '--spacing-5xl'
    align: center
    max-width: 680px
    border-sides: bottom
    border-color: '--border-default'
    allowed-block-types:
      - element
