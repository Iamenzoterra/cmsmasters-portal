version: 1
name: Inspector Test
scope: inspect-test
grid:
  desktop:
    min-width: 1440px
    columns:
      sidebar-left: 280px
      content: 1fr
      sidebar-right: 380px
    column-gap: '--spacing-xl'
    max-width: 1280px
    center: true
  tablet:
    min-width: 768px
    columns:
      content: 1fr
    column-gap: '0'
    sidebars: drawer
    drawer-width: 280px
    drawer-trigger: hamburger
    drawer-position: both
slots:
  header:
    position: top
    padding: '--spacing-lg'
    min-height: 60px
  sidebar-left:
    padding: '--spacing-lg'
    gap: '--spacing-md'
    min-height: 400px
  content:
    padding: '--spacing-xl'
    gap: '--spacing-lg'
    min-height: 500px
  sidebar-right:
    padding: '--spacing-xs'
    gap: '--spacing-md'
    align: flex-start
    min-height: 400px
  footer:
    position: bottom
    padding: '--spacing-lg'
    min-height: 80px
test-blocks:
  sidebar-right:
    - sidebar-pricing
    - sidebar-perfect-for
  header:
    - header
  content:
    - fast-loading-speed
