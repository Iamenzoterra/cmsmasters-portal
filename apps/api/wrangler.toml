name = "cmsmasters-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
SUPABASE_URL = "https://yxcqtwuyktbjxstahfqj.supabase.co"
R2_PUBLIC_URL = "https://assets.cmsmasters.studio"

# Secrets (set via `wrangler secret put <NAME>`):
# SUPABASE_SERVICE_KEY  — Supabase service_role key
# SUPABASE_JWT_SECRET   — Supabase JWT secret (Settings → API → JWT Secret)
#
# For local dev, create apps/api/.dev.vars (gitignored) with:
#   SUPABASE_URL=https://your-project.supabase.co
#   SUPABASE_SERVICE_KEY=eyJ...
#   SUPABASE_JWT_SECRET=your-jwt-secret

# R2 bucket for block assets (images, etc.)
# Create bucket: wrangler r2 bucket create cmsmasters-assets
# Enable public access in Cloudflare dashboard → R2 → bucket → Settings → Public access
[[r2_buckets]]
binding = "ASSETS_BUCKET"
bucket_name = "cmsmasters-assets"
