name: Block-Forge Inspector e2e

on:
  pull_request:
    paths:
      - 'tools/block-forge/**'
      - 'packages/block-forge-core/**'
      - 'packages/ui/src/primitives/tooltip.tsx'
      - 'packages/ui/src/theme/responsive-config.json'
      - '.github/workflows/e2e-block-forge.yml'
  workflow_dispatch:

concurrency:
  group: e2e-block-forge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  inspector-e2e:
    name: Inspector e2e (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install block-forge dependencies
        run: cd tools/block-forge && npm install --no-save

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run Inspector e2e
        run: npm run block-forge:test:e2e
        env:
          CI: 'true'

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tools/block-forge/playwright-report/
          retention-days: 7
